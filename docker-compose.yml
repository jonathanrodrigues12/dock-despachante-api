services:
  db_dock:
    image: postgres:15
    container_name: db_dock
    env_file:
      - .env
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $POSTGRES_USER -d $POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: api_backend
    env_file:
      - .env
    depends_on:
      db_dock:
        condition: service_healthy
    ports:
      - '3333:3333'
    command: >
      sh -c "node dist/database/run-seeders && node dist/main"

volumes:
  pgdata:
